# Upcoming Seminars
- title: Vision Language Models See What You Want but not What You See
  date: May 15, 2024
  time: 2:00 PM ET
  speaker: Qingying Gao
  affiliation: Johns Hopkins University
  url: https://example.com/qingying-gao
  image: /assets/images/members/qingying_gao.jpg
  abstract: Knowing others' intentions and taking others' perspectives are two core components of human intelligence that are considered to be instantiations of theory-of-mind. In this talk, I will discuss our recent work investigating intentionality understanding and level-2 perspective-taking in Vision Language Models (VLMs).
  link: https://zoom.us/link
  link_text: Zoom Link
  type: upcoming

