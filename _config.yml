title: Tong Lab
author: Tong Zhang
description: Tong Lab — research, systems, multimodal learning, agent routing, and living AI workflows.
keywords: "Tong Lab, Tong Zhang, AI, multimodal learning, world models, agent systems, tool router, vision-language models, LLM safety"
title-img: "/img/tonglab-logo.png"
avatar: "/img/members/tong.jpg"
navbar-links:
  Home: "/"
  People: "/pages/People"
  Projects: "/pages/Projects"
  News: "/pages/Blogs"
  ✉: "/pages/Contact"

social-network-links:
  github: "the-star-sea/TongLab"
  email: "tongz27@uci.edu"

excerpt_length: 50
feed_show_excerpt: true
feed_show_tags: false
post_search: false

navbar-col: "#eef2ff"
navbar-text-col: "#1f2937"
navbar-border-col: "#d4d9f5"
page-col: "#ffffff"
text-col: "#243043"
link-col: "#355caa"
hover-col: "#264b97"
footer-col: "#eef2ff"
footer-border-col: "#d4d9f5"
footer-text-col: "#243043"
footer-link-col: "#355caa"
footer-hover-col: "#264b97"
mobile-theme-col: "#eef2ff"

timezone: "Asia/Shanghai"
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
paginate: 5
url: "https://the-star-sea.github.io"
baseurl: "/TongLab"

kramdown:
  input: GFM

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: false
      social-share: false
  -
    scope:
      path: ""
    values:
      layout: "page"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - docs/

plugins:
  - jekyll-paginate
  - jekyll-sitemap
